<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FG Car Rental</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --panel: #111; --border: #222;
    --red: #c0392b; --red2: #e74c3c; --white: #f0f0f0;
    --gray: #888; --light: #1a1a1a; --green: #27ae60; --amber: #f39c12;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--white); font-family:'DM Sans',sans-serif; min-height:100vh; }

  /* NAV */
  nav { background:var(--panel); border-bottom:1px solid var(--border); padding:0 2rem;
    display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:100; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:var(--red2); letter-spacing:2px; }
  .nav-tabs { display:flex; gap:0; }
  .nav-tab { padding:.5rem 1.2rem; cursor:pointer; color:var(--gray); font-size:.85rem; font-weight:500;
    border-bottom:2px solid transparent; transition:all .2s; letter-spacing:.5px; }
  .nav-tab:hover { color:var(--white); }
  .nav-tab.active { color:var(--red2); border-bottom-color:var(--red2); }

  /* MAIN */
  main { max-width:1100px; margin:0 auto; padding:2rem; }

  /* SECTIONS */
  .section { display:none; animation: fadeIn .3s ease; }
  .section.active { display:block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  h2 { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--red2); letter-spacing:2px; margin-bottom:1.5rem; }
  h3 { font-size:1rem; font-weight:600; color:var(--white); margin-bottom:1rem; }

  /* CARDS GRID */
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1rem; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:1.2rem;
    transition:border-color .2s, transform .2s; }
  .card:hover { border-color:var(--red); transform:translateY(-2px); }
  .card-title { font-weight:600; font-size:1rem; margin-bottom:.4rem; }
  .card-sub { color:var(--gray); font-size:.82rem; margin-bottom:.8rem; }
  .badge { display:inline-block; padding:.2rem .6rem; border-radius:4px; font-size:.75rem; font-weight:600; }
  .badge-green { background:rgba(39,174,96,.15); color:var(--green); border:1px solid rgba(39,174,96,.3); }
  .badge-red { background:rgba(192,57,43,.15); color:var(--red2); border:1px solid rgba(192,57,43,.3); }
  .badge-amber { background:rgba(243,156,18,.15); color:var(--amber); border:1px solid rgba(243,156,18,.3); }
  .card-meta { display:flex; justify-content:space-between; align-items:center; margin-top:.8rem; }
  .price { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; color:var(--red2); }

  /* FORMS */
  .form-box { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:1.5rem; max-width:480px; }
  .form-row { margin-bottom:1rem; }
  label { display:block; font-size:.8rem; color:var(--gray); margin-bottom:.4rem; font-weight:500; letter-spacing:.5px; }
  input, select { width:100%; background:var(--light); border:1px solid var(--border); border-radius:6px;
    padding:.6rem .9rem; color:var(--white); font-family:'DM Sans',sans-serif; font-size:.9rem; outline:none; transition:border-color .2s; }
  input:focus, select:focus { border-color:var(--red); }
  select option { background:var(--panel); }

  /* BUTTONS */
  .btn { padding:.6rem 1.4rem; border-radius:6px; border:none; cursor:pointer; font-family:'DM Sans',sans-serif;
    font-size:.85rem; font-weight:600; transition:all .2s; letter-spacing:.3px; }
  .btn-primary { background:var(--red2); color:white; }
  .btn-primary:hover { background:var(--red); }
  .btn-ghost { background:transparent; color:var(--gray); border:1px solid var(--border); }
  .btn-ghost:hover { color:var(--white); border-color:var(--white); }
  .btn-sm { padding:.35rem .9rem; font-size:.78rem; }

  /* SEARCH BAR */
  .search-bar { display:flex; gap:.8rem; margin-bottom:1.5rem; flex-wrap:wrap; }
  .search-bar input, .search-bar select { width:auto; flex:1; min-width:140px; }

  /* TABLE */
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:.85rem; }
  th { background:var(--light); color:var(--gray); font-weight:600; padding:.7rem 1rem; text-align:left;
    font-size:.75rem; letter-spacing:.5px; border-bottom:1px solid var(--border); }
  td { padding:.7rem 1rem; border-bottom:1px solid var(--border); color:var(--white); }
  tr:hover td { background:var(--light); }

  /* RESPONSE BOX */
  .response { background:var(--light); border:1px solid var(--border); border-radius:6px;
    padding:1rem; margin-top:1rem; font-family:'Courier New',monospace; font-size:.8rem;
    color:#67e8f9; min-height:48px; white-space:pre-wrap; word-break:break-all; max-height:200px; overflow-y:auto; }
  .response.success { border-color:var(--green); color:#86efac; }
  .response.error { border-color:var(--red2); color:#fca5a5; }

  /* DASHBOARD STATS */
  .stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:1rem; margin-bottom:2rem; }
  .stat { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:1.2rem; text-align:center; }
  .stat-num { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; color:var(--red2); line-height:1; }
  .stat-label { color:var(--gray); font-size:.78rem; margin-top:.3rem; letter-spacing:.5px; }

  /* LOGIN */
  .login-wrap { max-width:360px; margin:3rem auto; }
  .login-wrap .form-box { border-color:var(--red); }
  .login-title { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; color:var(--red2); text-align:center; margin-bottom:1.5rem; letter-spacing:3px; }

  /* ALERTS */
  .alert { padding:.7rem 1rem; border-radius:6px; font-size:.85rem; margin-bottom:1rem; }
  .alert-success { background:rgba(39,174,96,.15); border:1px solid rgba(39,174,96,.4); color:#86efac; }
  .alert-error { background:rgba(231,76,60,.15); border:1px solid rgba(231,76,60,.4); color:#fca5a5; }

  .row-btns { display:flex; gap:.5rem; }
  .loading { color:var(--gray); font-size:.85rem; padding:2rem; text-align:center; }
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
  @media(max-width:640px){ .two-col{grid-template-columns:1fr;} }
</style>
</head>
<body>

<nav>
  <div class="logo">FG AUTOS</div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="showTab('cars')">Cars</div>
    <div class="nav-tab" onclick="showTab('booking')">Book a Car</div>
    <div class="nav-tab" onclick="showTab('customers')">Customers</div>
    <div class="nav-tab" onclick="showTab('admin')">Admin</div>
  </div>
</nav>

<main>

  <!-- ── CARS ── -->
  <div id="tab-cars" class="section active">
    <h2>Available Cars</h2>

    <div class="search-bar">
      <input type="text" id="searchColor" placeholder="Filter by color...">
      <select id="searchClass">
        <option value="">All Classes</option>
        <option value="SUV">SUV</option>
        <option value="Sedan">Sedan</option>
        <option value="Sports">Sports</option>
        <option value="Luxury">Luxury</option>
      </select>
      <input type="number" id="searchPrice" placeholder="Max price/day...">
      <button class="btn btn-primary" onclick="searchCars()">Search</button>
      <button class="btn btn-ghost" onclick="loadCars()">Show All</button>
    </div>

    <div id="cars-grid" class="grid"><div class="loading">Loading cars...</div></div>

    <br><h2>Add New Car</h2>
    <div class="form-box">
      <div class="two-col">
        <div class="form-row"><label>CAR NAME</label><input id="add-carName" placeholder="e.g. BMW X5"></div>
        <div class="form-row"><label>CAR NUMBER</label><input id="add-carNumber" placeholder="e.g. LB-1001"></div>
        <div class="form-row"><label>MODEL YEAR</label><input id="add-carModel" placeholder="e.g. 2024"></div>
        <div class="form-row"><label>RENT PRICE / DAY</label><input type="number" id="add-rentPrice" placeholder="e.g. 80"></div>
        <div class="form-row"><label>CLASS</label>
          <select id="add-carClass"><option>SUV</option><option>Sedan</option><option>Sports</option><option>Luxury</option></select>
        </div>
        <div class="form-row"><label>COLOR</label><input id="add-color" placeholder="e.g. Black"></div>
      </div>
      <button class="btn btn-primary" onclick="addCar()">Add Car</button>
      <div id="add-car-res" class="response" style="display:none"></div>
    </div>
  </div>

  <!-- ── BOOKING ── -->
  <div id="tab-booking" class="section">
    <h2>Book a Car</h2>
    <div class="two-col">
      <div class="form-box">
        <h3>New Booking</h3>
        <div class="form-row"><label>CUSTOMER ID</label><input type="number" id="b-customerID" placeholder="e.g. 1"></div>
        <div class="form-row"><label>CAR ID</label><input type="number" id="b-carID" placeholder="e.g. 2"></div>
        <div class="form-row"><label>START DATE</label><input type="date" id="b-startDate"></div>
        <div class="form-row"><label>END DATE</label><input type="date" id="b-endDate"></div>
        <button class="btn btn-primary" onclick="bookCar()" style="width:100%">Confirm Booking</button>
        <div id="booking-res" class="response" style="display:none"></div>
      </div>
      <div>
        <div class="form-box" style="margin-bottom:1rem">
          <h3>Cancel Booking</h3>
          <div class="form-row"><label>RENTAL ID</label><input type="number" id="cancel-id" placeholder="e.g. 1"></div>
          <button class="btn btn-ghost" onclick="cancelBooking()" style="width:100%">Cancel Booking</button>
          <div id="cancel-res" class="response" style="display:none"></div>
        </div>
        <div class="form-box">
          <h3>My Bookings</h3>
          <div class="form-row"><label>CUSTOMER ID</label><input type="number" id="my-custID" placeholder="e.g. 1"></div>
          <button class="btn btn-ghost" onclick="myBookings()" style="width:100%">View My Bookings</button>
          <div id="my-res" class="response" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── CUSTOMERS ── -->
  <div id="tab-customers" class="section">
    <h2>Customers</h2>
    <div class="two-col">
      <div>
        <div class="form-box" style="margin-bottom:1.5rem">
          <h3>Register New Customer</h3>
          <div class="form-row"><label>FULL NAME</label><input id="reg-name" placeholder="e.g. John Doe"></div>
          <div class="form-row"><label>USERNAME</label><input id="reg-username" placeholder="e.g. johndoe"></div>
          <div class="form-row"><label>PASSWORD</label><input type="password" id="reg-password" placeholder="••••••••"></div>
          <div class="form-row"><label>EMAIL</label><input id="reg-email" placeholder="john@email.com"></div>
          <div class="form-row"><label>PHONE</label><input id="reg-phone" placeholder="71000001"></div>
          <div class="form-row"><label>GENDER</label>
            <select id="reg-gender"><option>Male</option><option>Female</option></select>
          </div>
          <button class="btn btn-primary" onclick="register()" style="width:100%">Register</button>
          <div id="reg-res" class="response" style="display:none"></div>
        </div>
      </div>
      <div>
        <div class="form-box" style="margin-bottom:1.5rem">
          <h3>Customer Login</h3>
          <div class="form-row"><label>USERNAME</label><input id="login-user" placeholder="username"></div>
          <div class="form-row"><label>PASSWORD</label><input type="password" id="login-pass" placeholder="••••••••"></div>
          <button class="btn btn-primary" onclick="customerLogin()" style="width:100%">Login</button>
          <div id="login-res" class="response" style="display:none"></div>
        </div>
        <div class="form-box">
          <h3>All Customers</h3>
          <button class="btn btn-ghost" onclick="loadCustomers()" style="width:100%">Load All Customers</button>
          <div id="cust-res" class="response" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── ADMIN ── -->
  <div id="tab-admin" class="section">
    <h2>Admin Panel</h2>
    <div id="admin-login-section">
      <div class="login-wrap">
        <div class="login-title">ADMIN LOGIN</div>
        <div class="form-box">
          <div class="form-row"><label>USERNAME</label><input id="admin-user" placeholder="admin"></div>
          <div class="form-row"><label>PASSWORD</label><input type="password" id="admin-pass" placeholder="••••••••"></div>
          <button class="btn btn-primary" onclick="adminLogin()" style="width:100%">Login as Admin</button>
          <div id="admin-login-res" class="response" style="display:none"></div>
        </div>
      </div>
    </div>

    <div id="admin-dashboard" style="display:none">
      <div id="stats-row" class="stats"></div>
      <h3 style="margin-bottom:1rem;color:var(--gray);letter-spacing:.5px;font-size:.85rem">ALL BOOKINGS</h3>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>RENTAL ID</th><th>CUSTOMER</th><th>CAR</th>
            <th>START</th><th>END</th><th>TOTAL</th><th>STATUS</th>
          </tr></thead>
          <tbody id="dashboard-tbody"><tr><td colspan="7" class="loading">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<script>
const API = 'https://localhost:7215';

// ── TAB SWITCHING ─────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'cars') loadCars();
}

// ── SHOW RESPONSE ─────────────────────────────────────
function showRes(id, data, ok=true) {
  const el = document.getElementById(id);
  el.style.display = 'block';
  el.className = 'response ' + (ok ? 'success' : 'error');
  el.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
}

// ── CARS ──────────────────────────────────────────────
async function loadCars() {
  try {
    const res = await fetch(`${API}/api/cars`);
    const cars = await res.json();
    renderCars(cars);
  } catch(e) { document.getElementById('cars-grid').innerHTML = '<div class="loading">Could not connect to API. Make sure the project is running (F5).</div>'; }
}

async function searchCars() {
  const color = document.getElementById('searchColor').value;
  const cls   = document.getElementById('searchClass').value;
  const price = document.getElementById('searchPrice').value;
  let url = `${API}/api/cars/search?`;
  if (cls)   url += `carClass=${cls}&`;
  if (price) url += `maxPrice=${price}&`;
  if (color) url += `color=${color}&`;
  try {
    const res = await fetch(url);
    if (res.status === 204) { renderCars([]); return; }
    const cars = await res.json();
    renderCars(cars);
  } catch(e) { console.error(e); }
}

function renderCars(cars) {
  const grid = document.getElementById('cars-grid');
  if (!cars || cars.length === 0) {
    grid.innerHTML = '<div class="loading">No cars found.</div>'; return;
  }
  grid.innerHTML = cars.map(c => `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:.5rem">
        <div class="card-title">${c.carName}</div>
        <span class="badge ${c.carStatus==='Available'?'badge-green':c.carStatus==='Rented'?'badge-red':'badge-amber'}">${c.carStatus}</span>
      </div>
      <div class="card-sub">${c.carModel} · ${c.carClass||'—'} · ${c.color||'—'}</div>
      <div class="card-sub" style="font-family:monospace;font-size:.78rem;color:#555">${c.carNumber}</div>
      <div class="card-meta">
        <div class="price">$${c.rentPrice}<span style="font-family:'DM Sans';font-size:.7rem;color:var(--gray)">/day</span></div>
        <div style="font-size:.75rem;color:var(--gray)">ID: ${c.carID}</div>
      </div>
    </div>`).join('');
}

async function addCar() {
  const car = {
    carName: document.getElementById('add-carName').value,
    carNumber: document.getElementById('add-carNumber').value,
    carModel: document.getElementById('add-carModel').value,
    rentPrice: parseInt(document.getElementById('add-rentPrice').value)||0,
    carStatus: 'Available',
    carClass: document.getElementById('add-carClass').value,
    color: document.getElementById('add-color').value
  };
  try {
    const res = await fetch(`${API}/api/cars`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(car)
    });
    const data = await res.json();
    showRes('add-car-res', res.ok ? `✓ Car added! ID: ${data.carID}` : data, res.ok);
    if (res.ok) loadCars();
  } catch(e) { showRes('add-car-res', 'Connection error — is the API running?', false); }
}

// ── BOOKING ───────────────────────────────────────────
async function bookCar() {
  const rental = {
    customerID: parseInt(document.getElementById('b-customerID').value),
    carID: parseInt(document.getElementById('b-carID').value),
    startDate: document.getElementById('b-startDate').value,
    endDate: document.getElementById('b-endDate').value,
    total: 0, status: 'Active'
  };
  try {
    const res = await fetch(`${API}/api/rentals`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(rental)
    });
    const data = await res.json();
    showRes('booking-res', res.ok ? `✓ Booking confirmed!\nRental ID: ${data.rentalId}\nTotal: $${data.total}` : JSON.stringify(data), res.ok);
  } catch(e) { showRes('booking-res', 'Connection error', false); }
}

async function cancelBooking() {
  const id = document.getElementById('cancel-id').value;
  try {
    const res = await fetch(`${API}/api/rentals/${id}/cancel`, { method:'PUT' });
    const txt = await res.text();
    showRes('cancel-res', res.ok ? `✓ ${txt}` : txt, res.ok);
  } catch(e) { showRes('cancel-res','Connection error',false); }
}

async function myBookings() {
  const id = document.getElementById('my-custID').value;
  try {
    const res = await fetch(`${API}/api/rentals/customer/${id}`);
    const data = await res.json();
    showRes('my-res', data, res.ok);
  } catch(e) { showRes('my-res','Connection error',false); }
}

// ── CUSTOMERS ─────────────────────────────────────────
async function register() {
  const c = {
    customerName: document.getElementById('reg-name').value,
    username: document.getElementById('reg-username').value,
    password: document.getElementById('reg-password').value,
    email: document.getElementById('reg-email').value,
    phone: document.getElementById('reg-phone').value,
    gender: document.getElementById('reg-gender').value
  };
  try {
    const res = await fetch(`${API}/api/customers/register`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(c)
    });
    const txt = await res.text();
    showRes('reg-res', res.ok ? `✓ ${txt}` : txt, res.ok);
  } catch(e) { showRes('reg-res','Connection error',false); }
}

async function customerLogin() {
  const body = { username: document.getElementById('login-user').value, password: document.getElementById('login-pass').value };
  try {
    const res = await fetch(`${API}/api/customers/login`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
    });
    const data = await res.json();
    showRes('login-res', res.ok ? `✓ Welcome, ${data.customerName}!\nID: ${data.customerID}` : 'Invalid credentials', res.ok);
  } catch(e) { showRes('login-res','Connection error',false); }
}

async function loadCustomers() {
  try {
    const res = await fetch(`${API}/api/customers`);
    const data = await res.json();
    showRes('cust-res', data, true);
  } catch(e) { showRes('cust-res','Connection error',false); }
}

// ── ADMIN ─────────────────────────────────────────────
async function adminLogin() {
  const body = { username: document.getElementById('admin-user').value, password: document.getElementById('admin-pass').value };
  try {
    const res = await fetch(`${API}/api/admin/login`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
    });
    const data = await res.json();
    if (res.ok) {
      document.getElementById('admin-login-section').style.display = 'none';
      document.getElementById('admin-dashboard').style.display = 'block';
      loadDashboard();
    } else {
      showRes('admin-login-res', 'Invalid credentials', false);
    }
  } catch(e) { showRes('admin-login-res','Connection error',false); }
}

async function loadDashboard() {
  try {
    const res = await fetch(`${API}/api/admin/dashboard`);
    const rentals = await res.json();

    // stats
    const total = rentals.length;
    const active = rentals.filter(r=>r.status==='Active').length;
    const cancelled = rentals.filter(r=>r.status==='Cancelled').length;
    const revenue = rentals.filter(r=>r.status==='Active').reduce((s,r)=>s+r.total,0);
    document.getElementById('stats-row').innerHTML = `
      <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">TOTAL BOOKINGS</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--green)">${active}</div><div class="stat-label">ACTIVE</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--gray)">${cancelled}</div><div class="stat-label">CANCELLED</div></div>
      <div class="stat"><div class="stat-num">$${revenue}</div><div class="stat-label">TOTAL REVENUE</div></div>`;

    // table
    document.getElementById('dashboard-tbody').innerHTML = rentals.map(r => `
      <tr>
        <td>#${r.rentalID}</td>
        <td>${r.customer?.customerName||'—'}</td>
        <td>${r.car?.carName||'—'} <span style="color:var(--gray);font-size:.75rem">${r.car?.carNumber||''}</span></td>
        <td>${r.startDate?.split('T')[0]||'—'}</td>
        <td>${r.endDate?.split('T')[0]||'—'}</td>
        <td style="color:var(--green);font-weight:600">$${r.total}</td>
        <td><span class="badge ${r.status==='Active'?'badge-green':'badge-red'}">${r.status}</span></td>
      </tr>`).join('');
  } catch(e) { console.error(e); }
}

// Load cars on start
loadCars();
</script>
</body>
</html>
